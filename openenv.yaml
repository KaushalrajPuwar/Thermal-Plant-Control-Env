# openenv.yaml
# Defines the OpenEnv-compliant metadata for the thermal plant benchmark.

# The name of the benchmark. This should be a unique, descriptive identifier.
name: thermal-plant-control-v1

# A brief, one-sentence description of the benchmark's goal.
description: A benchmark for controlling a simulated thermal power plant with trade-offs between power output, efficiency, and system stress.

# The Python module and function that returns the task registry dictionary.
# The format is `path.to.module:function_name`.
tasks: tasks.registry:task_registry

# The Python module and function that returns the grader registry dictionary.
# The format is `path.to.module:function_name`.
graders: graders.registry:grader_registry
