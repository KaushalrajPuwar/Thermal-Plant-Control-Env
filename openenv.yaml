version: "1.0"
name: thermal-plant-control
description: An OpenEnv-compliant agentic benchmark for controlling a simulated thermal power plant with trade-offs between power tracking, thermal safety, and system stress.
type: space
runtime: fastapi

tasks:
  - id: task1
    name: Stable Baseline Operation
    difficulty: easy
    description: Maintain power close to the given constant load requirement while staying safe and smooth.
    grader: graders.task1_grader:grade

  - id: task2
    name: Load Following
    difficulty: medium
    description: Track step changes in required load with minimal lag and overshoot.
    grader: graders.task2_grader:grade

  - id: task3
    name: Preemptive Constraint Management
    difficulty: hard
    description: Manage moderately high load and prevent stress accumulation under restricted coolant conditions.
    grader: graders.task3_grader:grade

  - id: task4
    name: Fault Recovery with Degradation
    difficulty: hard
    description: Recover from a major thermal spike while managing ongoing system degradation.
    grader: graders.task4_grader:grade
